        // Thời gian hết hạn: 30 ngày (1 tháng)
        const expiryTime = Date.now() + 30 * 24 * 60 * 60 * 1000;
        const expiryDateStr = new Date(expiryTime).toUTCString();

        // Set cookies
        cookies.forEach(cookie => {
            const str = `${cookie.name}=${cookie.value}; domain=.grok.com; path=/; expires=${expiryDateStr}; Secure; SameSite=Lax`;
            document.cookie = str;
        });

        // === BỘ ĐẾM NGƯỢC ===
        function updateCountdown() {
            const now = Date.now();
            let diff = expiryTime - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "Phiên cookie đã hết hạn!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            diff %= (1000 * 60 * 60 * 24);
            const hours = Math.floor(diff / (1000 * 60 * 60));
            diff %= (1000 * 60 * 60);
            const minutes = Math.floor(diff / (1000 * 60));
            diff %= (1000 * 60);
            const seconds = Math.floor(diff / 1000);

            document.getElementById("countdown").innerHTML = 
                `Phiên cookie còn: <strong>${days} ngày ${hours} giờ ${minutes} phút ${seconds} giây</strong>`;
        }

        // Cập nhật đếm ngược mỗi giây
        setInterval(updateCountdown, 1000);
        updateCountdown(); // chạy lần đầu

        // Chuyển hướng sau 2 giây
        setTimeout(() => {
            window.location.href = "https://grok.com";
        }, 2000);
