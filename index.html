<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Auto Login</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #000; color: #fff; }
        .card { text-align: center; padding: 30px; border: 1px solid #333; border-radius: 12px; background: #111; max-width: 400px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #22c55e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin: 0 0 10px; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Đang đăng nhập Grok</h2>
        <p>Hệ thống đang khởi tạo phiên làm việc 30 ngày. Vui lòng không đóng trình duyệt...</p>
    </div>
